services:
  - type: web
    name: smartspend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn spems.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: spems.settings_prod
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: smartspend-db
          property: connectionString
